<!DOCTYPE html>
<html>
<head>
<title>Textora – Icon Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f8f9fc; color: #1a1f2e; padding: 32px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  p  { color: #9ba5be; font-size: 14px; margin-bottom: 28px; }
  .grid { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-end; }
  .icon-card {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    background: white; border: 1px solid #e4e8f0; border-radius: 16px;
    padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .size-label { font-size: 12px; font-weight: 600; color: #4b5572; }
  a.dl {
    display: inline-block; padding: 7px 16px; background: #4f6ef7;
    color: white; border-radius: 8px; font-size: 12px; font-weight: 600;
    text-decoration: none; margin-top: 4px;
  }
  a.dl:hover { background: #3b5af5; }
  .note { margin-top: 28px; padding: 14px 18px; background: #eef1ff;
    border-radius: 10px; font-size: 13px; color: #4f6ef7; font-weight: 500; }
</style>
</head>
<body>
<h1>🔭 Textora – Icon Generator</h1>
<p>Click "Download" under each size, then save all icons to the <code>icons/</code> folder.</p>

<div class="grid" id="grid"></div>

<div class="note">
  💡 Save files as: <strong>icon16.png · icon32.png · icon48.png · icon128.png</strong>
  inside the <code>icons/</code> folder of the extension.
</div>

<script>
const sizes = [16, 32, 48, 128];

function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size;

  // ── Background: blue rounded square ──────────────────────────
  const r = s * 0.18;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fillStyle = '#4f6ef7';
  ctx.fill();

  // ── Magnifying glass ─────────────────────────────────────────
  const cx = s * 0.42;
  const cy = s * 0.42;
  const radius = s * 0.255;
  const lw = Math.max(1.5, s * 0.072);

  // Lens circle
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = lw;
  ctx.stroke();

  // Handle
  const angle = Math.PI * 0.78;
  const hx1 = cx + Math.cos(angle) * (radius - lw / 2);
  const hy1 = cy + Math.sin(angle) * (radius - lw / 2);
  const hLen = s * 0.2;
  const hx2 = hx1 + Math.cos(angle) * hLen;
  const hy2 = hy1 + Math.sin(angle) * hLen;

  ctx.beginPath();
  ctx.moveTo(hx1, hy1);
  ctx.lineTo(hx2, hy2);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = lw * 1.1;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Text lines inside lens (only for sizes >= 32)
  if (size >= 32) {
    const lineH  = Math.max(1.2, s * 0.038);
    const lineR2 = lineH / 2;
    const spacing = s * 0.085;
    const widths  = [radius * 1.1, radius * 0.82, radius * 0.55];
    const opacities = [1, 0.75, 0.5];
    const startY = cy - spacing;

    for (let i = 0; i < 3; i++) {
      const lx = cx - widths[i] / 2;
      const ly = startY + i * spacing - lineH / 2;
      ctx.beginPath();
      ctx.roundRect(lx, ly, widths[i], lineH, lineR2);
      ctx.fillStyle = `rgba(255,255,255,${opacities[i]})`;
      ctx.fill();
    }
  }

  return canvas;
}

const grid = document.getElementById('grid');

sizes.forEach(size => {
  const canvas = drawIcon(size);
  const dataUrl = canvas.toDataURL('image/png');

  // Display at least 64px so small icons are visible
  const displaySize = Math.max(size, 64);
  canvas.style.cssText = `width:${displaySize}px;height:${displaySize}px;image-rendering:pixelated;border-radius:${displaySize*0.18}px`;

  const link = document.createElement('a');
  link.href = dataUrl;
  link.download = `icon${size}.png`;
  link.className = 'dl';
  link.textContent = 'Download';

  const card = document.createElement('div');
  card.className = 'icon-card';
  card.innerHTML = `<span class="size-label">${size} × ${size}</span>`;
  card.insertBefore(canvas, card.firstChild);
  card.appendChild(link);

  grid.appendChild(card);
});
</script>
</body>
</html>
